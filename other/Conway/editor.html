<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game of Life Pattern String Lab</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }
        h1 { color: #38bdf8; margin-bottom: 5px; font-size: 1.8rem; }
        p { color: #94a3b8; font-size: 0.9rem; margin: 0 0 20px 0; text-align: center; }
        
        .main-layout {
            display: flex;
            gap: 20px;
            max-width: 1000px;
            width: 100%;
        }
        
        .canvas-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .canvas-container {
            border: 2px solid #334155;
            border-radius: 8px;
            overflow: hidden;
            background-color: #020617;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }
        
        canvas { display: block; cursor: crosshair; }
        
        .controls-panel {
            width: 320px;
            background-color: #1e293b;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        
        h3 { margin: 0; font-size: 0.9rem; color: #38bdf8; text-transform: uppercase; letter-spacing: 0.5px; }
        
        .btn-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        
        button, textarea, input {
            background-color: #334155;
            color: #f8fafc;
            border: 1px solid #475569;
            padding: 8px 12px;
            font-size: 0.9rem;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
        }
        button:hover { background-color: #475569; border-color: #38bdf8; }
        button.active { background-color: #38bdf8; color: #000; border-color: #38bdf8; }
        
        textarea {
            width: 100%;
            height: 100px;
            font-family: monospace;
            font-size: 0.85rem;
            resize: none;
            box-sizing: border-box;
            background-color: #0f172a;
            cursor: text;
        }
        
        .dimensions { display: flex; gap: 8px; align-items: center; }
        .dimensions input { width: 60px; text-align: center; }
        label { font-size: 0.8rem; color: #94a3b8; }
    </style>
</head>
<body>

    <h1>Pattern String Builder</h1>
    <p>Draw on the grid to instantly generate raw strings, or paste a string to visually edit it.</p>

    <div class="main-layout">
        <div class="canvas-area">
            <div class="canvas-container">
                <canvas id="editorCanvas"></canvas>
            </div>
        </div>

        <div class="controls-panel">
            <div>
                <h3>Canvas Size</h3>
                <div class="dimensions" style="margin-top: 8px;">
                    <label>W:</label> <input type="number" id="widthInput" value="40" min="5" max="100">
                    <label>H:</label> <input type="number" id="heightInput" value="15" min="5" max="100">
                    <button id="resizeBtn" style="padding: 6px 10px;">Resize</button>
                </div>
            </div>

            <div>
                <h3>Interactive Sandbox</h3>
                <div class="btn-row" style="margin-top: 8px;">
                    <button id="modeBtn" class="active">🖌️ Drawing Mode</button>
                    <button id="testBtn">▶️ Test Pattern</button>
                </div>
                <div class="btn-row" style="margin-top: 8px;">
                    <button id="clearBtn">Clear Grid</button>
                    <button id="trimBtn" title="Trims empty outer rows and columns">Crop to Fit</button>
                </div>
            </div>

            <div>
                <h3>Generated String Output</h3>
                <p style="text-align: left; margin: 4px 0; font-size: 0.75rem;">Copy this string into your <code>rawPatterns</code> object:</p>
                <textarea id="stringOutput" readonly placeholder="Draw on the grid to create a string..."></textarea>
                <button id="copyBtn" style="width: 100%; margin-top: 5px;">📋 Copy to Clipboard</button>
            </div>

            <div>
                <h3>Import String Editor</h3>
                <p style="text-align: left; margin: 4px 0; font-size: 0.75rem;">Paste an existing pattern string here to load it:</p>
                <textarea id="stringInput" placeholder="Paste string here (e.g. 010|001|111)"></textarea>
                <button id="loadBtn" style="width: 100%; margin-top: 5px;">📥 Load & Modify String</button>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('editorCanvas');
        const ctx = canvas.getContext('2d');
        
        const widthInput = document.getElementById('widthInput');
        const heightInput = document.getElementById('heightInput');
        const resizeBtn = document.getElementById('resizeBtn');
        const modeBtn = document.getElementById('modeBtn');
        const testBtn = document.getElementById('testBtn');
        const clearBtn = document.getElementById('clearBtn');
        const trimBtn = document.getElementById('trimBtn');
        const stringOutput = document.getElementById('stringOutput');
        const copyBtn = document.getElementById('copyBtn');
        const stringInput = document.getElementById('stringInput');
        const loadBtn = document.getElementById('loadBtn');

        const CELL_SIZE = 16;
        let COLS = parseInt(widthInput.value);
        let ROWS = parseInt(heightInput.value);
        let grid = Array(ROWS).fill(null).map(() => Array(COLS).fill(0));
        
        let isDrawing = false;
        let isTesting = false;
        let testInterval = null;

        function init() {
            canvas.width = COLS * CELL_SIZE;
            canvas.height = ROWS * CELL_SIZE;
            render();
        }

        function render() {
            ctx.fillStyle = '#020617';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    if (grid[r][c] === 1) {
                        ctx.fillStyle = '#38bdf8';
                        ctx.fillRect(c * CELL_SIZE, r * CELL_SIZE, CELL_SIZE - 1, CELL_SIZE - 1);
                    } else {
                        ctx.fillStyle = '#1e293b';
                        ctx.fillRect(c * CELL_SIZE, r * CELL_SIZE, CELL_SIZE, CELL_SIZE);
                        ctx.fillStyle = '#0f172a';
                        ctx.fillRect(c * CELL_SIZE, r * CELL_SIZE, CELL_SIZE - 1, CELL_SIZE - 1);
                    }
                }
            }
            if (!isTesting) generateString();
        }
        function generateString() {
            let activeBox = getBoundingBox();
            if (!activeBox) {
                stringOutput.value = "";
                return;
            }

            let rowsArray = [];
            for (let r = activeBox.minR; r <= activeBox.maxR; r++) {
                let rowStr = "";
                for (let c = activeBox.minC; c <= activeBox.maxC; c++) {
                    rowStr += grid[r][c];
                }
                rowsArray.push(rowStr);
            }
            stringOutput.value = rowsArray.join('|');
        }

        function getBoundingBox() {
            let minR = ROWS, maxR = -1, minC = COLS, maxC = -1;
            let found = false;
            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    if (grid[r][c] === 1) {
                        if (r < minR) minR = r;
                        if (r > maxR) maxR = r;
                        if (c < minC) minC = c;
                        if (c > maxC) maxC = c;
                        found = true;
                    }
                }
            }
            return found ? { minR, maxR, minC, maxC } : null;
        }

        function runGameStep() {
            let next = Array(ROWS).fill(null).map(() => Array(COLS).fill(0));
            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    let neighbors = 0;
                    for (let i = -1; i <= 1; i++) {
                        for (let j = -1; j <= 1; j++) {
                            if (i === 0 && j === 0) continue;
                            let nr = (r + i + ROWS) % ROWS;
                            let nc = (c + j + COLS) % COLS;
                            neighbors += grid[nr][nc];
                        }
                    }
                    if (grid[r][c] === 1 && (neighbors === 2 || neighbors === 3)) next[r][c] = 1;
                    else if (grid[r][c] === 0 && neighbors === 3) next[r][c] = 1;
                }
            }
            grid = next;
            render();
        }

        function draw(e) {
            if (isTesting) return;
            const rect = canvas.getBoundingClientRect();
            const c = Math.floor((e.clientX - rect.left) / CELL_SIZE);
            const r = Math.floor((e.clientY - rect.top) / CELL_SIZE);

            if (r >= 0 && r < ROWS && c >= 0 && c < COLS) {
                if (e.type === 'mousedown') {
                    grid[r][c] = grid[r][c] === 1 ? 0 : 1;
                } else if (e.type === 'mousemove' && isDrawing) {
                    grid[r][c] = 1;
                }
                render();
            }
        }

        canvas.addEventListener('mousedown', (e) => { isDrawing = true; draw(e); });
        canvas.addEventListener('mousemove', draw);
        window.addEventListener('mouseup', () => isDrawing = false);

        testBtn.addEventListener('click', () => {
            isTesting = !isTesting;
            if (isTesting) {
                testBtn.textContent = "⏹️ Stop Engine";
                testBtn.classList.add('active');
                modeBtn.classList.remove('active');
                testInterval = setInterval(runGameStep, 100);
            } else {
                clearInterval(testInterval);
                testBtn.textContent = "▶️ Test Pattern";
                testBtn.classList.remove('active');
                modeBtn.classList.add('active');
                render();
            }
        });

        modeBtn.addEventListener('click', () => {
            if (!isTesting) return;
            isTesting = false;
            clearInterval(testInterval);
            testBtn.textContent = "▶️ Test Pattern";
            testBtn.classList.remove('active');
            modeBtn.classList.add('active');
            render();
        });

        clearBtn.addEventListener('click', () => {
            grid = Array(ROWS).fill(null).map(() => Array(COLS).fill(0));
            render();
        });

        trimBtn.addEventListener('click', () => {
            let box = getBoundingBox();
            if (!box) return;
            let newCols = (box.maxC - box.minC) + 1;
            let newRows = (box.maxR - box.minR) + 1;
            
            let cropped = Array(newRows).fill(null).map(() => Array(newCols).fill(0));
            for(let r = box.minR; r <= box.maxR; r++) {
                for(let c = box.minC; c <= box.maxC; c++) {
                    cropped[r - box.minR][c - box.minC] = grid[r][c];
                }
            }
            COLS = newCols; ROWS = newRows;
            widthInput.value = COLS; heightInput.value = ROWS;
            grid = cropped;
            init();
        });

        resizeBtn.addEventListener('click', () => {
            COLS = parseInt(widthInput.value) || 20;
            ROWS = parseInt(heightInput.value) || 20;
            let newGrid = Array(ROWS).fill(null).map(() => Array(COLS).fill(0));
            for(let r=0; r<Math.min(ROWS, grid.length); r++) {
                for(let c=0; c<Math.min(COLS, grid[0].length); c++) {
                    newGrid[r][c] = grid[r][c];
                }
            }
            grid = newGrid;
            init();
        });

        loadBtn.addEventListener('click', () => {
            let input = stringInput.value.trim();
            if(!input) return;
            try {
                let rows = input.split('|');
                let inputRows = rows.length;
                let inputCols = rows[0].length;
                
                COLS = Math.max(inputCols + 4, 20);
                ROWS = Math.max(inputRows + 4, 15);
                widthInput.value = COLS; heightInput.value = ROWS;
                
                grid = Array(ROWS).fill(null).map(() => Array(COLS).fill(0));
                let startR = Math.floor((ROWS - inputRows)/2);
                let startC = Math.floor((COLS - inputCols)/2);

                for(let r=0; r<inputRows; r++) {
                    let bits = rows[r].split('');
                    for(let c=0; c<inputCols; c++) {
                        grid[startR + r][startC + c] = parseInt(bits[c]) || 0;
                    }
                }
                init();
            } catch(e) { alert("Invalid pattern string format!"); }
        });

        copyBtn.addEventListener('click', () => {
            if(!stringOutput.value) return;
            navigator.clipboard.writeText(stringOutput.value);
            let originalText = copyBtn.textContent;
            copyBtn.textContent = "✅ Copied!";
            setTimeout(() => copyBtn.textContent = originalText, 1500);
        });

        init();
    </script>
</body>
</html>
