<!DOCTYPE html>

<html>
<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
    <title>Clickertale</title>

<style type="text/css">
    * {
        padding: 0;
        margin: 0;
    }
    html, body {
        background: #000;
        color: #fff;
        overflow: hidden;
        touch-action: none;
    }
    canvas {
        touch-action: none;
    }

    /* --- NEW UI --- */
    #autoclickerStatus {
        position: absolute;
        top: 10px;
        left: 10px;
        font-family: monospace;
        font-size: 14px;
        z-index: 9999;
        pointer-events: none;
        display: none; /* HIDDEN UNTIL UNLOCKED */
    }

    #secretMessage {
        position: absolute;
        top: 40px;
        left: 10px;
        font-family: monospace;
        font-size: 14px;
        color: #0f0;
        z-index: 9999;
        pointer-events: none;
        opacity: 0;
        transition: opacity 0.3s ease;
    }
</style>

</head>

<body>
    <div id="c2canvasdiv">
        <canvas id="c2canvas" width="1054" height="480"></canvas>
    </div>

<div id="autoclickerStatus">Autoclicker: OFF</div>
<div id="secretMessage">Autoclicker unlocked 🖱️</div>

<input style="display:none;" id="c2nwOpenFileDialog" type="file" />
<input style="display:none;" id="c2nwChooseFolderDialog" type="file" />
<input style="display:none;" id="c2nwSaveDialog" type="file" />

<script>
window.process = {
    execPath: "",
    platform: "browser",
    env: {},
    cwd: function () { return ""; }
};

window.require = function (module) {
    console.warn("Blocked require:", module);

    const stubs = {
        path: {
            dirname: () => "",
            join: () => "",
            resolve: () => "",
            basename: () => ""
        },
        os: {
            homedir: () => "",
            platform: () => "browser"
        },
        fs: {
            readFileSync: () => "",
            writeFileSync: () => {},
            existsSync: () => false
        },
        child_process: {
            exec: () => {},
            spawn: () => {}
        }
    };

    return stubs[module] || {};
};

window.nw = {
    process: window.process
};
</script>

<script src="jquery-2.1.1.min.js"></script>

<script src="c2runtime.js"></script>

<script>
    window.c2nodewebkit = false;

    jQuery(document).ready(function () {
        cr_createRuntime("c2canvas");
    });

    function onVisibilityChanged() {
        if (document.hidden ||
            document.mozHidden ||
            document.webkitHidden ||
            document.msHidden)
            cr_setSuspended(true);
        else
            cr_setSuspended(false);
    }

    document.addEventListener("visibilitychange", onVisibilityChanged, false);
    document.addEventListener("mozvisibilitychange", onVisibilityChanged, false);
    document.addEventListener("webkitvisibilitychange", onVisibilityChanged, false);
    document.addEventListener("msvisibilitychange", onVisibilityChanged, false);

    // --- SECRET AUTCLICKER SYSTEM ---
    let secretCode = "12251997";
    let inputBuffer = "";

    let autoClicker = null;
    let autoClickUnlocked = false;
    let autoClickEnabled = false;

    const statusEl = document.getElementById("autoclickerStatus");
    const messageEl = document.getElementById("secretMessage");

    function updateStatus() {
        statusEl.textContent = "Autoclicker: " + (autoClickEnabled ? "ON" : "OFF");
        statusEl.style.color = autoClickEnabled ? "#00ff00" : "#ff0000";
    }

    function showMessage() {
        messageEl.style.opacity = 1;
        setTimeout(() => {
            messageEl.style.opacity = 0;
        }, 5000);
    }

    function startAutoClick() {
        if (autoClicker) return;

        const canvas = document.getElementById("c2canvas");

        autoClicker = setInterval(() => {
            canvas.dispatchEvent(new MouseEvent("mousedown", { bubbles: true }));
            canvas.dispatchEvent(new MouseEvent("mouseup", { bubbles: true }));
            canvas.dispatchEvent(new PointerEvent("pointerdown", { bubbles: true }));
            canvas.dispatchEvent(new PointerEvent("pointerup", { bubbles: true }));
        }, 0);

        autoClickEnabled = true;
        updateStatus();
    }

    function stopAutoClick() {
        clearInterval(autoClicker);
        autoClicker = null;
        autoClickEnabled = false;
        updateStatus();
    }

    document.addEventListener("keydown", (e) => {
        if (/^[0-9]$/.test(e.key)) {
            inputBuffer += e.key;

            if (inputBuffer.length > secretCode.length) {
                inputBuffer = inputBuffer.slice(-secretCode.length);
            }

            if (inputBuffer === secretCode) {
    autoClickUnlocked = true;
    inputBuffer = "";

    // SHOW UI WHEN UNLOCKED
    statusEl.style.display = "block";

    // FORCE INITIAL COLOR + TEXT UPDATE
    updateStatus();

    showMessage();
}
        }

        if (e.key.toLowerCase() === "t" && autoClickUnlocked) {
            if (autoClickEnabled) {
                stopAutoClick();
            } else {
                startAutoClick();
            }
        }
    });
</script>

</body>
</html>
