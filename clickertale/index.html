<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
    <title>Clickertale</title>

    <style type="text/css">
        * {
            padding: 0;
            margin: 0;
        }
        html, body {
            background: #000;
            color: #fff;
            overflow: hidden;
            touch-action: none;
        }
        canvas {
            touch-action: none;
        }
    </style>
</head>

<body>
    <div id="c2canvasdiv">
        <canvas id="c2canvas" width="1054" height="480"></canvas>
    </div>

    <!-- file inputs are harmless in web mode -->
    <input style="display:none;" id="c2nwOpenFileDialog" type="file" />
    <input style="display:none;" id="c2nwChooseFolderDialog" type="file" />
    <input style="display:none;" id="c2nwSaveDialog" type="file" />
<script>
window.require = function (module) {
    console.warn("Blocked require:", module);

    if (module === "path") {
        return {
            dirname: function (p) {
                return "";
            },
            join: function () {
                return "";
            }
        };
    }

    if (module === "os") {
        return {
            homedir: function () {
                return "";
            }
        };
    }

    if (module === "fs") {
        return {};
    }

    if (module === "child_process") {
        return {};
    }

    return {};
};

window.process = {
    execPath: ""
};

window.nw = {
    process: window.process
};
</script>
    <script src="jquery-2.1.1.min.js"></script>
    <script src="c2runtime.js"></script>

    <script>
        // Force web mode (no NW.js)
        window.c2nodewebkit = false;

        // Construct 2 runtime start
        jQuery(document).ready(function () {
            cr_createRuntime("c2canvas");
        });

        // Pause when tab is hidden
        function onVisibilityChanged() {
            if (document.hidden ||
                document.mozHidden ||
                document.webkitHidden ||
                document.msHidden)
                cr_setSuspended(true);
            else
                cr_setSuspended(false);
        }

        document.addEventListener("visibilitychange", onVisibilityChanged, false);
        document.addEventListener("mozvisibilitychange", onVisibilityChanged, false);
        document.addEventListener("webkitvisibilitychange", onVisibilityChanged, false);
        document.addEventListener("msvisibilitychange", onVisibilityChanged, false);
    </script>
</body>
</html>
